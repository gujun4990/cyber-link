name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Windows native frontend bindings
        run: npm install --no-save @rollup/rollup-win32-x64-msvc@4.60.1 @tailwindcss/oxide-win32-x64-msvc@4.2.2 lightningcss-win32-x64-msvc@1.32.0

      # Build the web assets before packaging so Tauri embeds the final frontend bundle.
      - name: Build frontend
        run: npm run build

      # Use the repo-pinned Tauri CLI to keep CI packaging aligned with local builds.
      - name: Build Tauri app
        run: npm run tauri:build -- --bundles nsis

      - name: Collect release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-assets | Out-Null
          $assets = Get-ChildItem -Path src-tauri\target\release -Recurse -File |
            Where-Object { $_.FullName -match '\\bundle\\' -and ($_.Extension -eq '.exe' -or $_.Extension -eq '.msi' -or $_.Name -like '*.nsis.zip' -or $_.Name -like '*.msi.zip') }
          if (-not $assets) {
            throw "No release assets found under src-tauri/target/release/bundle"
          }
          foreach ($asset in $assets) {
            Copy-Item $asset.FullName -Destination release-assets -Force
            Write-Host "Collected $($asset.FullName)"
          }

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: cyber-link ${{ github.ref_name }}
          body: Windows release for cyber-link.
          files: |
            release-assets/*
